<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#c86322" />
    <meta name="description" content="把貼上的文字整理成繁體中文重點筆記，支援手機、平板與桌面。" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Abstract" />
    <title>Abstract PWA</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/icon-192.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero-card">
        <p class="eyebrow">Abstract PWA</p>
        <h1>把文字整理成繁體中文重點筆記</h1>
        <p class="hero-copy">這是可直接部署的純前端版本，支援手機、平板與桌面瀏覽器。內容會直接從你的裝置送到 DeepSeek，不需要你的電腦一直開著。</p>
        <div class="hero-tags">
          <span>純前端</span>
          <span>PWA</span>
          <span>繁體中文</span>
        </div>
      </section>

      <section class="panel input-panel">
        <div class="notice-card">
          <strong>使用提醒</strong>
          <p>DeepSeek API Key 會直接從目前裝置送到 DeepSeek，並只保存在你的瀏覽器本機。共用裝置不建議儲存。</p>
        </div>

        <div class="field-group two-up">
          <label class="field">
            <span>DeepSeek API Key</span>
            <input id="apiKeyInput" type="password" placeholder="sk-..." autocomplete="off" />
          </label>
          <label class="field">
            <span>模型</span>
            <select id="modelSelect">
              <option value="deepseek-chat">deepseek-chat</option>
              <option value="deepseek-reasoner">deepseek-reasoner</option>
            </select>
          </label>
        </div>

        <div class="field-group">
          <label class="field">
            <span>自訂標題（可留空）</span>
            <input id="manualTitleInput" type="text" placeholder="例如：會議摘要、研究筆記、文章摘錄" />
          </label>
          <label class="field">
            <span>文字內容</span>
            <textarea id="manualTextInput" rows="12" placeholder="把你想整理的文字貼在這裡，支援中英文內容，輸出會統一轉成繁體中文。"></textarea>
          </label>
        </div>

        <div class="action-row">
          <button id="summarizeTextButton" class="primary">開始整理</button>
          <button id="clearButton" class="secondary" type="button">清空內容</button>
        </div>

        <p id="statusText" class="status">尚未整理任何內容。</p>
        <p id="offlineHint" class="offline-hint" hidden>目前離線中，仍可查看已快取的頁面，但無法呼叫 DeepSeek 進行整理。</p>
      </section>

      <section class="panel result-panel">
        <div class="result-head">
          <div>
            <p class="section-kicker">整理結果</p>
            <h2 id="resultTitle">尚無結果</h2>
          </div>
          <p id="resultMeta" class="meta"></p>
        </div>

        <p id="resultSummary" class="summary">輸入文字並執行整理後，這裡會顯示繁體中文摘要與重點。</p>

        <section class="result-section">
          <h3>關鍵重點</h3>
          <div id="keyPoints"></div>
        </section>
        <section class="result-section">
          <h3>主要結論</h3>
          <div id="mainTakeaways"></div>
        </section>
        <section class="result-section">
          <h3>關鍵事實</h3>
          <div id="keyFacts"></div>
        </section>
        <section class="result-section">
          <h3>可行動項目</h3>
          <div id="actionItems"></div>
        </section>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
